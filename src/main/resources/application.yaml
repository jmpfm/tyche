spring:
  application:
    name: tyche
  datasource:
    url: jdbc:h2:mem:tyche;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

tyche:
  recommendations:
    kafka:
      topic: ${TYCHE_RECOMMENDATIONS_TOPIC:tyche.trade-recommendations.v1}
      enabled: ${TYCHE_RECOMMENDATIONS_KAFKA_ENABLED:true}
    schedule:
      enabled: ${TYCHE_RECOMMENDATIONS_SCHEDULE_ENABLED:true}
      cron: ${TYCHE_RECOMMENDATIONS_CRON:0 30 22 * * MON-FRI}
      zone: ${TYCHE_RECOMMENDATIONS_ZONE:Europe/London}
    news:
      enabled: ${TYCHE_RECOMMENDATIONS_NEWS_ENABLED:true}
      gdelt-url: ${TYCHE_GDELT_DOC_URL:https://api.gdeltproject.org/api/v2/doc/doc}
    macro:
      enabled: ${TYCHE_RECOMMENDATIONS_MACRO_ENABLED:true}
    financial:
      sec:
        user-agent: ${SEC_USER_AGENT:}
        tickers-url: ${TYCHE_SEC_TICKERS_URL:https://www.sec.gov/files/company_tickers.json}
        companyfacts-base-url: ${TYCHE_SEC_COMPANYFACTS_BASE_URL:https://data.sec.gov/api/xbrl/companyfacts}

---
spring:
  config:
    activate:
      on-profile: local

tyche:
  recommendations:
    kafka:
      enabled: false
    schedule:
      enabled: false
    news:
      gdelt-url: http://localhost:8089/api/v2/doc/doc
    financial:
      sec:
        user-agent: Tyche local-dev contact@example.com
        tickers-url: http://localhost:8089/files/company_tickers.json
        companyfacts-base-url: http://localhost:8089/api/xbrl/companyfacts

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/tyche}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:tyche}
    password: ${MYSQL_PASSWORD:}
  h2:
    console:
      enabled: false
